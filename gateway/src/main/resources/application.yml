server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: blog
          uri: lb://blog
          predicates:
            - Path=/api/blog/**

        - id: carrito
          uri: lb://carrito
          predicates:
            - Path=/carrito/**

        - id: comentarios
          uri: lb://comentarios
          predicates:
            - Path=/comentarios/**

        - id: inventario
          uri: lb://inventario
          predicates:
            - Path=/inventario/**

        - id: libro
          uri: lb://libro
          predicates:
            - Path=/libros/**

        - id: notificaciones
          uri: lb://notificaciones
          predicates:
            - Path=/notificaciones/**

        - id: prestamos
          uri: lb://prestamos
          predicates:
            - Path=/prestamos/**

        - id: reserva
          uri: lb://reserva
          predicates:
            - Path=/reservas/**

        - id: talleres
          uri: lb://talleres
          predicates:
            - Path=/talleres/**

        - id: usuarios
          uri: lb://usuarios
          predicates:
            - Path=/usuarios/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/

---
spring:
  config:
    activate:
      on-profile: test

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
